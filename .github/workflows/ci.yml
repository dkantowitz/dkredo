name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - uses: extractions/setup-just@v2

      - name: Vet and unit tests
        run: just test

      - name: Build
        run: just build

      - name: Integration tests
        run: just test-integration

      - name: Coverage check
        run: just cover-check
